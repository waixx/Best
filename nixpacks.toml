[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "chromium"]
aptPkgs = [
    "libglib2.0-0",
    "libnss3",
    "libnspr4",
    "libdbus-1-3",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libgbm1",
    "libasound2",
    "libpango-1.0-0",
    "libcairo2",
    "libx11-6",
    "libxcomposite1",
    "libxdamage1",
    "libxext6",
    "libxfixes3",
    "libxrandr2"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "pip install playwright",
    "playwright install chromium"
]

[start]
cmd = "python bot.py"
